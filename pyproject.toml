[tool.pylint.master]
ignore-paths = ["^tests/.*$", "^vulture_whitelist\\.py$"]

[tool.pylint.messages_control]
disable = ["C0114", "C0115", "C0116", "W0212", "R0801", "C0301", "W0718", "C0103", "R0914", "R0915", "R1732", "W1510", "W0311", "W0621", "W0622", "W0612", "C1803", "C0325", "W0130", "R0902", "R0903", "W0603", "R0911", "R0913", "R0917", "C0414", "C0413", "C0415", "W0611", "W1514", "W1203", "C0412", "R1702", "C0305", "W0613", "R1716", "C0411", "W0104", "E0602"]
[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "rag-context-optimizer"
version = "1.0.0"
description = "RAG pipeline optimization environment - minimize tokens, maximize answer quality"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fastapi==0.136.3",
  "uvicorn[standard]==0.49.0",
  "pydantic>=2.11,<3",
  "httpx==0.28.1",
  "openai>=1.30.0",
  "python-multipart==0.0.32",
  "openenv-core>=0.2.0",
]

[project.scripts]
server = "server.app:main"

[tool.setuptools]
packages = ["env", "server"]
py-modules = ["app", "inference", "validate"]

[project.optional-dependencies]
test = [
  "pytest>=8.0.0,<10",
  "pytest-asyncio",
  "httpx>=0.27.0",
  "streamlit>=1.0.0",
]
qa = [
  "vulture>=2.11",
  "radon>=6.0.1",
  "pip-audit>=2.7.3",
  "pip-licenses>=4.4.0",
  "pylint>=3.2.0",
  "bandit>=1.7.9",
  "safety>=3.2.0",
  "pytest-cov>=5.0.0",
  "ruff",
  "mypy",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.mypy]
ignore_missing_imports = true
check_untyped_defs = true
disallow_untyped_defs = false
exclude = [
    "^tests/"
]
