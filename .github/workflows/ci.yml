name: CI Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - "**"

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install pip==26.1.2
          pip install -e ".[test]"
          pip install ruff mypy git+https://github.com/meta-pytorch/OpenEnv.git

      - name: Run Ruff Linter
        run: ruff check .

      - name: Run Mypy
        run: mypy .

      - name: Run Pytest
        run: pytest tests/

      - name: Run OpenEnv Validation
        run: |
          openenv validate
          python validate.py
