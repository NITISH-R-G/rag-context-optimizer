name: CI Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - "**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        env:
          ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pip install ruff mypy git+https://github.com/meta-pytorch/OpenEnv.git

      - name: Run Ruff Linter
        run: ruff check .

      - name: Run Mypy
        run: mypy .

      - name: Run Pytest
        run: pytest tests/

      - name: Run OpenEnv Validation
        run: |
          openenv validate
          python validate.py
