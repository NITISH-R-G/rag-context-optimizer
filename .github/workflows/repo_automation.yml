name: Autonomous Repository Maintenance

on:
  push:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 0 * * *' # Daily scan

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-maintain:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0 # Full history for accurate analysis

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install openai

    - name: Analyze Codebase
      run: python .github/scripts/analyze_codebase.py

    - name: Generate Architecture Diagrams
      run: python .github/scripts/generate_diagrams.py

    - name: AI Documentation Agent
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: python .github/scripts/ai_docs_agent.py

    - name: Commit Automated Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add docs/ README.md || true
        git status
        git diff --staged --quiet || (git commit -m "docs: auto-update repository knowledge, architecture diagrams, and documentation" && git push)
