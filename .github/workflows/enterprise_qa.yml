name: Enterprise QA and Security

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "**" ]
  release:
    types: [published]
  schedule:
    - cron: '0 2 * * *' # Daily at 2 AM

permissions:
  contents: read
  pull-requests: write

jobs:
  quality-assurance:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test]"
        pip install -e ".[qa]"
        pip install openai openenv-core

    - name: Create Reports Directory
      run: mkdir -p reports

    - name: Secret Detection (Gitleaks)
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: License Compliance
      run: |
        pip-licenses --format=json > reports/pip-licenses.json || true

    - name: Generate SBOM
      uses: anchore/sbom-action@v0
      with:
        path: ./
        format: spdx-json
        output-file: reports/sbom.spdx.json

    - name: Lint and Format Code (Ruff)
      id: ruff
      continue-on-error: true
      run: |
        ruff check . > reports/ruff.txt
        ruff format --check . >> reports/ruff.txt

    - name: Type Checking (Mypy)
      id: mypy
      continue-on-error: true
      run: |
        mypy . > reports/mypy.txt

    - name: Dead Code Detection (Vulture)
      continue-on-error: true
      run: |
        vulture . > reports/vulture.txt || true

    - name: Duplicate Code and Style (Pylint)
      continue-on-error: true
      run: |
        pylint . > reports/pylint.txt || true

    - name: Complexity Analysis (Radon)
      continue-on-error: true
      run: |
        radon cc -j . > reports/radon.json || true

    - name: Security Scanning (Bandit)
      id: bandit
      continue-on-error: true
      run: |
        bandit -r . -ll -ii -f json -o reports/bandit.json

    - name: Dependency Security Audit (Pip-Audit)
      id: pipaudit
      continue-on-error: true
      run: |
        pip-audit -f json > reports/pip-audit.json

    - name: Dependency Security Scan (Safety)
      id: safety
      continue-on-error: true
      run: |
        safety check --output json > reports/safety.json

    - name: Test Coverage
      continue-on-error: true
      run: |
        pytest tests/ --cov=. > reports/coverage.txt || true

    - name: Generate AI Quality Insights
      if: always()
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        python .github/scripts/ai_qa_insights.py

    - name: Upload Reports as Artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: qa-reports
        path: reports/

    - name: Check for Critical Failures
      if: always()
      run: |
        if [ "${{ steps.ruff.outcome }}" == "failure" ] || \
           [ "${{ steps.mypy.outcome }}" == "failure" ] || \
           [ "${{ steps.bandit.outcome }}" == "failure" ] || \
           [ "${{ steps.pipaudit.outcome }}" == "failure" ] || \
           [ "${{ steps.safety.outcome }}" == "failure" ]; then
           echo "Critical quality or security issues found. Failing pipeline."
           exit 1
        fi
