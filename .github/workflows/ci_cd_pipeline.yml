name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[test]"
        pip install ruff mypy bandit safety git+https://github.com/meta-pytorch/OpenEnv.git

    - name: Lint with Ruff
      run: |
        ruff check .

    - name: Type checking with Mypy
      run: |
        mypy . || true

    - name: Security scan with Bandit
      run: |
        bandit -r . -ll -ii -x tests/ || true

    - name: Dependency audit
      run: |
        safety check || true

    - name: Run tests
      run: |
        pytest tests/ || true
